# ====================================
# カナ → 音素変換マッピング
# ====================================

# ------------------------------------
# 母音 (Vowels)
# ------------------------------------
ア: [a]
# ァ: [a] # 小書き
イ: [i]
# ィ: [i] # 小書き
ウ: [u]
# ゥ: [u] # 小書き
エ: [e]
# ェ: [e] # 小書き
オ: [o]
# ォ: [o] # 小書き

# ------------------------------------
# ワ行 (W-row)
# ------------------------------------
ワ: [w, a]
ヰ: [i]
ヱ: [e]
ヲ: [o]

# ウ行拡張 (W + vowel)
ウィ: [w, i]
ウェ: [w, e]
ウォ: [w, o]

# ------------------------------------
# カ行 (K-row)
# ------------------------------------
カ: [k, a]
キ: [k, i]
ク: [k, u]
ケ: [k, e]
# ヶ: [k, e] # 助数詞の「ヶ」
コ: [k, o]

# キ拗音 (Ky-)
キャ: [ky, a]
キュ: [ky, u]
キョ: [ky, o]
キェ: [ky, e]

# クヮ (Kw-)
# クヮ: [kw, a]
クヮ: [k, a]

# ------------------------------------
# ガ行 (G-row)
# ------------------------------------
ガ: [g, a]
ギ: [g, i]
グ: [g, u]
ゲ: [g, e]
ゴ: [g, o]

# ギ拗音 (Gy-)
ギャ: [gy, a]
ギュ: [gy, u]
ギョ: [gy, o]
ギェ: [gy, e]

# グヮ (Gw-)
# グヮ: [gw, a]
グヮ: [g, a]

# ------------------------------------
# サ行 (S-row)
# ------------------------------------
サ: [s, a]
シ: [sh, i]
ス: [s, u]
セ: [s, e]
ソ: [s, o]

# スィ (外来語)
# スィ: [s, i]
スィ: [sh, i]

# シ拗音 (Sh-)
シャ: [sh, a]
シュ: [sh, u]
ショ: [sh, o]
シェ: [sh, e]

# ------------------------------------
# ザ行 (Z-row)
# ------------------------------------
ザ: [z, a]
ジ: [j, i]
ズ: [z, u]
ゼ: [z, e]
ゾ: [z, o]

# ズィ (外来語)
# ズィ: [z, i]
ズィ: [j, i]

# ジ拗音 (J-)
ジャ: [j, a]
ジュ: [j, u]
ジョ: [j, o]
ジェ: [j, e]

ジァ: [j, a]

# ------------------------------------
# タ行 (T-row)
# ------------------------------------
タ: [t, a]
チ: [ch, i]
ツ: [ts, u]
テ: [t, e]
ト: [t, o]

# ティ・トゥ (外来語)
ティ: [t, i]
トゥ: [t, u]

# チ拗音 (Ch-)
チャ: [ch, a]
チュ: [ch, u]
チョ: [ch, o]
チェ: [ch, e]

# ツ拡張 (Ts-)
ツァ: [ts, a]
ツィ: [ts, i]
ツェ: [ts, e]
ツォ: [ts, o]

# テ拗音 (Ty-)
# テャ: [ty, a]
# テュ: [ty, u]
# テョ: [ty, o]

# HACK: 従来のもの (ESPnetも含む) はこっちで対応している
テャ: [ts, a]
テュ: [ts, u]
テョ: [ts, o]

# 促音
ッ: [q]

# ------------------------------------
# ダ行 (D-row)
# ------------------------------------
ダ: [d, a]
ヂ: [j, i]
ヅ: [z, u]
デ: [d, e]
ド: [d, o]

# ディ・ドゥ (外来語)
ディ: [d, i]
ドゥ: [d, u]

# デ拗音 (Dy-)
デャ: [dy, a]
デュ: [dy, u]
デョ: [dy, o]

# ------------------------------------
# ナ行 (N-row)
# ------------------------------------
ナ: [n, a]
ニ: [n, i]
ヌ: [n, u]
ネ: [n, e]
ノ: [n, o]

# ニ拗音 (Ny-)
ニャ: [ny, a]
ニュ: [ny, u]
ニョ: [ny, o]
# ニェ: [ny, e]
ニェ: [n, e]

# ------------------------------------
# ハ行 (H-row)
# ------------------------------------
ハ: [h, a]
ヒ: [h, i]
フ: [f, u]
ヘ: [h, e]
ホ: [h, o]

# ヒ拗音 (Hy-)
ヒャ: [hy, a]
ヒュ: [hy, u]
ヒョ: [hy, o]
# ヒェ: [hy, e]
ヒェ: [h, e]

# フ拡張 (F-)
ファ: [f, a]
フィ: [f, i]
フェ: [f, e]
フォ: [f, o]

フョ: [hy, o]
フュ: [hy, u]

# ------------------------------------
# バ行 (B-row)
# ------------------------------------
バ: [b, a]
ビ: [b, i]
ブ: [b, u]
ベ: [b, e]
ボ: [b, o]

# ビ拗音 (By-)
ビャ: [by, a]
ビュ: [by, u]
ビョ: [by, o]
ビェ: [by, e]

ブィ: [b, i]

# ------------------------------------
# パ行 (P-row)
# ------------------------------------
パ: [p, a]
ピ: [p, i]
プ: [p, u]
ペ: [p, e]
ポ: [p, o]

# ピ拗音 (Py-)
ピャ: [py, a]
ピュ: [py, u]
ピョ: [py, o]
ピェ: [py, e]

# ------------------------------------
# マ行 (M-row)
# ------------------------------------
マ: [m, a]
ミ: [m, i]
ム: [m, u]
メ: [m, e]
モ: [m, o]

# ミ拗音 (My-)
ミャ: [my, a]
ミュ: [my, u]
ミョ: [my, o]
# ミェ: [my, e]
ミェ: [m, e]

# ------------------------------------
# ヤ行 (Y-row)
# ------------------------------------
ヤ: [y, a]
# ャ: [y, a] # 小書き
ユ: [y, u]
# ュ: [y, u] # 小書き
ヨ: [y, o]
# ョ: [y, o] # 小書き

# イェ (外来語)
# イェ: [y, e]
イェ: [i, e]

# ------------------------------------
# ラ行 (R-row)
# ------------------------------------
ラ: [r, a]
リ: [r, i]
ル: [r, u]
レ: [r, e]
ロ: [r, o]

# リ拗音 (Ry-)
リャ: [ry, a]
リュ: [ry, u]
リョ: [ry, o]
リェ: [ry, e]

# ------------------------------------
# ン (Syllabic N)
# ------------------------------------
ン: [N]

# ------------------------------------
# ヴ行 (V-row) - 外来語
# ------------------------------------
# ヴ: [v, u]
# ヴァ: [v, a]
# ヴィ: [v, i]
# ヴェ: [v, e]
# ヴォ: [v, o]
ヴ: [b, u]
ヴァ: [b, a]
ヴィ: [b, i]
ヴェ: [b, e]
ヴォ: [b, o]

# ヴ拗音 (Vy- → By-)
# ヴャ: [by, a]
# ヴュ: [by, u]
# ヴョ: [by, o]
